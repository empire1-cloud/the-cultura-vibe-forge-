steps:
  # ── Backend ──────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-backend
    args:
      - build
      - -t
      - gcr.io/disco-amphora-490606-n8/cultura-backend:$COMMIT_SHA
      - -f
      - backend/Dockerfile
      - backend

  - name: gcr.io/cloud-builders/docker
    id: push-backend
    args: [push, gcr.io/disco-amphora-490606-n8/cultura-backend:$COMMIT_SHA]
    waitFor: [build-backend]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-backend
    entrypoint: gcloud
    args:
      - run
      - deploy
      - cultura-backend
      - --image=gcr.io/disco-amphora-490606-n8/cultura-backend:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --set-env-vars=DB_NAME=cultura-vibe,CORS_ORIGINS=*
      - --set-secrets=MONGO_URL=MONGO_URL:latest,JWT_SECRET=JWT_SECRET:latest,EMERGENT_LLM_KEY=EMERGENT_LLM_KEY:latest,STRIPE_API_KEY=STRIPE_SECRET_KEY_CULTURA:latest
    waitFor: [push-backend]

  # ── Frontend ─────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-frontend
    args:
      - build
      - -t
      - gcr.io/disco-amphora-490606-n8/cultura-frontend:$COMMIT_SHA
      - -f
      - frontend/Dockerfile
      - frontend
    waitFor: ["-"]

  - name: gcr.io/cloud-builders/docker
    id: push-frontend
    args: [push, gcr.io/disco-amphora-490606-n8/cultura-frontend:$COMMIT_SHA]
    waitFor: [build-frontend]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-frontend
    entrypoint: gcloud
    args:
      - run
      - deploy
      - cultura-frontend
      - --image=gcr.io/disco-amphora-490606-n8/cultura-frontend:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --set-env-vars=REACT_APP_API_URL=https://cultura-backend-e2q5oemapa-uc.a.run.app/api
    waitFor: [push-frontend]

images:
  - gcr.io/disco-amphora-490606-n8/cultura-backend:$COMMIT_SHA
  - gcr.io/disco-amphora-490606-n8/cultura-frontend:$COMMIT_SHA

timeout: 1800s
